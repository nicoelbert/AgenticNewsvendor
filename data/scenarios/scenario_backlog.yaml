        Aktionen. Die Salatnachfrage ist recht wetterempfindlich.

      why_order_more: |
        Ich empfehle 62 Einheiten (4 mehr als Prognose). Die
        Kostenstruktur favorisiert leichtes Überbestellen: €1,60
        entgangener Gewinn pro Fehlmenge vs. €1,20 Verlust pro
