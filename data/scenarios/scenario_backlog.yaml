        wie ein typischer Freitag mit normalen Nachfragemustern.

      what_missing: |
        Ich verfolge keine lokalen Events oder Wettbewerberaktionen.
        Wenn es ein Sportereignis gibt oder etwas, das Leute zu Hause
        hält, könnte sich die Nachfrage nach Fertiggerichten ändern.
        Ansonsten sollte es ein normaler Freitag sein.

