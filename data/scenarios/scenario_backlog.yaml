scenarios:

  # ---------------------------------------------------------------------------
  # S01: Frischer Salat - Normaler Tag (KI VERTRAUEN)
  # ---------------------------------------------------------------------------
  S01:
    id: "S01"
    product: "fresh_salad"
    date: "Donnerstag, 12. Juni"
    scenario_type: "trust_ai"
    difficulty: "easy"

    features:
      visible:
        temperature: 24
        rain: false
        weekday: "Donnerstag"
        price: 3.20
        promotion: false
      hidden:
        sports_event: false
        school_holiday: false
        local_festival: false
      noise:
        - "neue_regalbeschilderung"

    narrative: |
      Sie sind verantwortlich für die Frischeabteilung bei EDEKA Trabold in
      Würzburg-Zellerau. Morgen ist Donnerstag, der 12. Juni - ein normaler
      Wochentag in der Monatsmitte.

      Die Wettervorhersage zeigt angenehme Temperaturen um 24°C ohne Regen.
      Es ist eine normale Woche ohne besondere Ereignisse oder Feiertage.
      Die Salate haben den regulären Preis (€3,20).

      Das Geschäft hat kürzlich die Regalbeschilderung in der Obst- und
      Gemüseabteilung aktualisiert. Der Kundenverkehr war diese Woche
      gleichmäßig, nichts Ungewöhnliches zu berichten. Letzter Donnerstag
      war ein typischer Tag.

    demand_history: [48, 35, 38, 42, 44, 52, 46, 47, 34, 39, 43, 45, 51, 48]

    computed:
      ai_forecast: 52
      ai_recommendation: 56
      true_expected_demand: 52
      optimal_order: 56
      actual_demand: 54

    ai_responses:
      explain_forecast: |
        Meine Prognose basiert auf:
        • Basisnachfrage für Salate: ~45 Einheiten
        • Temperatur (24°C): +3 Einheiten (warmes Wetter erhöht Salatverkauf)
        • Donnerstag: +4 Einheiten (Wochenmitte-Anstieg)
        • Kein Regen: Basis
        • Keine Aktion: Basis

        Gesamtprognose: 52 Einheiten

      confidence: |
        Ich bin recht zuversichtlich bei dieser Prognose. Bei ähnlichen
        Bedingungen in der Vergangenheit lag die tatsächliche Nachfrage
        in etwa 70% der Fälle innerhalb von ±6 Einheiten meiner Vorhersage.

      what_factors: |
        Mein Modell berücksichtigt: Temperatur, Niederschlag, Wochentag,
        aktueller Preis und ob eine Aktion läuft. Ich schaue auch auf
        aktuelle historische Verkaufsmuster für dieses Produkt.

      why_order_more: |
        Ich empfehle 56 Einheiten zu bestellen (4 mehr als die Prognose),
        weil Fehlmengen teurer sind als Überschüsse. Jeder verpasste
        Verkauf kostet €1,60 Gewinn, während jeder unverkaufte Salat
        nur €1,20 kostet (Kosten minus Restwert). Diese Asymmetrie
        bedeutet, dass leichtes Überbestellen besser ist.

      consider_specific: |
        Ich sehe keine besonderen Ereignisse oder ungewöhnlichen Faktoren
        für morgen. Meine Prognose spiegelt einen typischen Donnerstag
        mit gutem Wetter wider.

      what_missing: |
        Ich habe keine Informationen über lokale Veranstaltungen,
        Schulpläne oder Wettbewerberaktivitäten. Wenn Sie von etwas
        Ungewöhnlichem in der Nähe wissen, sollten Sie das berücksichtigen.

  # ---------------------------------------------------------------------------
  # S02: Eis - Schulferienstart (NACH OBEN ANPASSEN)
  # ---------------------------------------------------------------------------
  S02:
    id: "S02"
    product: "ice_cream"
    date: "Freitag, 18. Juli"
    scenario_type: "override_up"
    difficulty: "medium"

    features:
      visible:
        temperature: 28
        rain: false
        weekday: "Freitag"
        price: 4.99
        promotion: false
      hidden:
        sports_event: false
        school_holiday: true
        local_festival: false
      noise:
        - "kuehlschrank_gewartet"
        - "neue_geschmacksrichtung"

    narrative: |
      Sie verwalten die Tiefkühldesserts bei Tegut in Würzburg-Sanderau.
      Morgen ist Freitag, der 18. Juli.

      Die Wettervorhersage zeigt einen warmen und sonnigen Tag mit
      Temperaturen bis 28°C. Kein Regen erwartet. Es ist ein regulärer
      Freitag mit Standardpreisen für alle Eisprodukte.

      Morgen ist der erste Tag der Sommerferien in Bayern. Viele Familien
      bereiten sich auf die Ferienzeit vor. Sie haben diese Woche mehr
      Kinder im Laden bemerkt, da die Schulen auslaufen.

      Die Eis-Kühltruhe des Ladens wurde letzte Woche gewartet und
      funktioniert einwandfrei. Eine neue Mango-Sorbet-Sorte wurde
      kürzlich ins Sortiment aufgenommen.

    demand_history: [42, 38, 45, 48, 52, 58, 55, 44, 40, 47, 50, 54, 60, 56]

    computed:
      ai_forecast: 65
      ai_recommendation: 72
      true_expected_demand: 85
      optimal_order: 93
      actual_demand: 88

    ai_responses:
      explain_forecast: |
        Meine Prognose basiert auf:
        • Basisnachfrage für Eis: ~35 Einheiten
        • Temperatur (28°C): +12 Einheiten (sehr warm = starke Eisnachfrage)
        • Freitag: +5 Einheiten
        • Kein Regen: +8 Einheiten vs. Regenbasis
        • Keine Aktion: Basis

        Gesamtprognose: 65 Einheiten

      confidence: |
        Ich bin mäßig zuversichtlich. Sommerwetter-Vorhersagen sind
        normalerweise zuverlässig, und Eisnachfrage korreliert stark
        mit der Temperatur. Typische Abweichung ist ±8 Einheiten bei
        ähnlichen Bedingungen.

      what_factors: |
        Mein Modell berücksichtigt: Temperatur (sehr wichtig für Eis),
        Sonnenschein, Niederschlag, Wochentag, Preise und Aktionen.
        Eis ist eines der wetterempfindlichsten Produkte.

      why_order_more: |
        Ich empfehle 72 Einheiten (7 mehr als Prognose), weil Eis
        keinen Restwert hat - unverkaufte Artikel sind ein kompletter
        Verlust von €2,50 pro Stück. Aber verpasste Verkäufe kosten
        auch €2,49 Gewinn. Die Kosten sind fast symmetrisch, also
        bestelle ich leicht über der Prognose.

      consider_school_holiday: |
        Ich habe keinen Zugang zu Schulferienkalendern. Meine Prognose
        basiert auf Wetter, Wochentag und historischen Mustern. Wenn
        Schulferien typischerweise die Eisnachfrage nach Ihrer Erfahrung
        beeinflussen, sollten Sie entsprechend anpassen.

      what_missing: |
        Ich habe keine Informationen über Schulpläne, lokale Events
        oder besondere Anlässe. Familien mit Kindern kaufen tendenziell
        mehr Eis - wenn Sie mehr Familien beim Einkaufen erwarten,
        erwägen Sie eine Anpassung nach oben.

