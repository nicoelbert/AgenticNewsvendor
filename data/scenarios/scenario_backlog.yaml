        Meine Prognose basiert auf:
        • Basisnachfrage für Fertiggerichte: ~55 Einheiten
        • Temperatur (18°C): +1 Einheit (mild, leicht positiv)
        • Freitag: +12 Einheiten (starker Wochenend-Vorbereitungseffekt)
        • Kein Regen: Basis
        • Keine Aktion: Basis

        Gesamtprognose: 67 Einheiten

