# Szenario-Backlog für Agentic Newsvendor Studie
# Version: 1.0
# Letzte Aktualisierung: 2024-02-09

# =============================================================================
# SZENARIO-MATRIX
# =============================================================================
#
# Balance: 5 "KI vertrauen" + 5 "Anpassung nötig"
# Produkte: 3 Salat, 3 Eis, 2 Fertiggerichte, 2 Backwaren
#
# | ID  | Produkt       | Versteckter Faktor | KI-Qualität | Aktion      |
# |-----|---------------|-------------------|-------------|-------------|
# | S01 | Salat         | Keiner            | Gut         | Vertrauen   |
# | S02 | Eis           | Schulferien       | Unter       | Erhöhen ↑   |
# | S03 | Fertiggericht | Keiner            | Gut         | Vertrauen   |
# | S04 | Backwaren     | Straßenfest       | Unter       | Erhöhen ↑   |
# | S05 | Salat         | Wetter falsch     | Über        | Reduzieren ↓|
# | S06 | Eis           | Keiner (Rauschen) | Gut         | Vertrauen   |
# | S07 | Fertiggericht | Fußballspiel      | Unter       | Erhöhen ↑   |
# | S08 | Backwaren     | Wochenmarkt       | Über        | Reduzieren ↓|
# | S09 | Salat         | Kleines Event     | Gut         | Vertrauen*  |
# | S10 | Eis           | Fest + Hitze      | Unter       | Erhöhen ↑   |
#
# * S09: Event vorhanden aber kleiner Effekt für Salat - testet Über-Anpassung
# =============================================================================

