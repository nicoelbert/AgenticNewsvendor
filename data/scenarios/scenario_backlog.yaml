        mit sich ändernden Vorhersagen. Wenn Sie Grund haben zu
        glauben, dass das Wetter anders sein wird, passen Sie
        entsprechend an.

      what_missing: |
        Ich verwende die offizielle Wettervorhersage von heute Morgen.
        Wettervorhersagen können sich ändern, besonders für
        Nachmittagsbedingungen. Ich verfolge auch keine lokalen
        Events oder Schulpläne.

