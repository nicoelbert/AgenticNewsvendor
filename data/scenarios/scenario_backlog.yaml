      Sie wissen aus Erfahrung, dass regnerische Tage den Salatverkauf
      deutlich reduzieren - Leute verzichten auf frische Salate, wenn
      das Wetter umschlägt.

    demand_history: [50, 36, 42, 45, 48, 54, 51, 49, 35, 41, 44, 47, 53, 50]

    computed:
      ai_forecast: 58
      ai_recommendation: 62
      true_expected_demand: 48
      optimal_order: 52
      actual_demand: 46

    ai_responses:
      explain_forecast: |
        Meine Prognose basiert auf:
        • Basisnachfrage für Salate: ~45 Einheiten
        • Temperatur (27°C): +6 Einheiten (warmes Wetter steigert Salate)
        • Mittwoch: +3 Einheiten
        • Kein Regen erwartet: +4 Einheiten vs. Regenbasis
        • Keine Aktion: Basis

        Gesamtprognose: 58 Einheiten

      confidence: |
        Ich bin recht zuversichtlich bei dieser Prognose. Das warme,
        sonnige Wetter sollte eine gute Salatnachfrage antreiben.
        Typische Genauigkeit bei Sommerbedingungen ist ±5 Einheiten.

